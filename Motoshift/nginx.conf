server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: qualquer rota desconhecida cai no index.html (roteamento do Flutter).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados (com hash no nome) podem ser cacheados agressivamente.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Nunca cachear o index.html — garante que novos deploys sejam carregados.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
