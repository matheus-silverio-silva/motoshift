# ============================================================
#  MotoShift — perfil de produção (MySQL)
#  Todas as credenciais vêm de variáveis de ambiente.
#  Nunca adicione valores reais aqui.
# ============================================================

# --- Servidor ---
server.port=${PORT:8080}

# --- MySQL ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- H2 Console desabilitado em produção ---
spring.h2.console.enabled=false

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Logs reduzidos em produção ---
logging.level.org.springframework.web=WARN
logging.level.com.motoshift=INFO

# --- Anthropic API ---
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-20250514

# --- Servlet mode (WebFlux no classpath) ---
spring.main.web-application-type=servlet

# --- Actuator ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=${PORT:8080}
