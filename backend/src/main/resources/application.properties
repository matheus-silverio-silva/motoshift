# ============================================================
#  MotoShift — configuração de desenvolvimento (H2 em memória)
# ============================================================

spring.application.name=motoshift-backend
server.port=8080

# --- H2 em memória ---
spring.datasource.url=jdbc:h2:mem:motoshiftdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Console H2 (acesse http://localhost:8080/h2-console) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# --- JPA ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Jackson: serializar datas como ISO 8601 (nao como array numerico) ---
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Logs para depurar requisicoes do Flutter ---
logging.level.org.springframework.web=DEBUG
logging.level.com.motoshift=DEBUG
logging.level.org.springframework.web.cors=TRACE

# --- Anthropic API (Sugestao Inteligente de Turnos) ---
# NUNCA coloque a chave real aqui. Use a variavel de ambiente ANTHROPIC_API_KEY.
# Linux/Mac: export ANTHROPIC_API_KEY=sk-ant-...
# Windows:   set ANTHROPIC_API_KEY=sk-ant-...
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-20250514

# Garante que o app permanece servlet-based mesmo com WebFlux no classpath
spring.main.web-application-type=servlet
